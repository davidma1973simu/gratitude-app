<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#fafaf9" />
  <title>感恩日记 · Gratitude</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-title" content="感恩日记" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface-hover: #f5f5f4;
      --border: #e7e5e4;
      --border-light: #f5f5f4;
      --text-primary: #1c1917;
      --text-secondary: #78716c;
      --text-tertiary: #a8a29e;
      --accent: #1c1917;
      --accent-soft: #f5f5f4;
      --success: #16a34a;
      --radius: 14px;
      --radius-lg: 20px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.12), 0 8px 24px rgba(0,0,0,0.06);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, 'SF Pro Text', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body { display: flex; flex-direction: column; min-height: 100dvh; }

    /* ─── Nav ─── */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(250,250,249,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border-light);
      padding: 0 24px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .nav-date { font-size: 13px; color: var(--text-tertiary); font-weight: 400; }
    .nav-tabs {
      display: flex; gap: 2px; background: var(--border-light); border-radius: 10px; padding: 3px;
    }
    .nav-tab {
      padding: 5px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
      border: none; cursor: pointer; background: transparent; color: var(--text-secondary);
      transition: all 0.18s ease;
    }
    .nav-tab.active { background: var(--surface); color: var(--text-primary); box-shadow: var(--shadow-sm); }

    /* ─── User Avatar ─── */
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent-soft); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-secondary);
      transition: all 0.18s ease; overflow: hidden;
    }
    .user-avatar:hover { border-color: var(--text-tertiary); }

    /* ─── Main ─── */
    main { flex: 1; padding: 24px 24px 100px; max-width: 560px; margin: 0 auto; width: 100%; }

    /* ─── Today View ─── */
    .today-header { margin-bottom: 28px; }
    .today-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; line-height: 1.2; }
    .today-header p { font-size: 15px; color: var(--text-secondary); margin-top: 6px; font-weight: 400; }

    .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .progress-dots { display: flex; gap: 6px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .dot.filled { background: var(--text-primary); transform: scale(1.1); }
    .progress-label { font-size: 13px; color: var(--text-tertiary); }

    /* ─── Entry Cards ─── */
    .entries-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

    .entry-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }
    .entry-card:focus-within { box-shadow: var(--shadow-md); border-color: var(--border); }

    .entry-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .entry-number {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      color: var(--text-tertiary); text-transform: uppercase;
    }
    .entry-tag {
      font-size: 11px; color: var(--text-tertiary);
      background: var(--accent-soft); border-radius: 6px; padding: 2px 8px;
    }
    .entry-tag.done { color: var(--success); background: #f0fdf4; }

    .entry-textarea {
      width: 100%; border: none; outline: none; resize: none;
      font-size: 15px; font-weight: 400; line-height: 1.6;
      color: var(--text-primary); background: transparent;
      padding: 0 16px 14px; min-height: 60px; max-height: 120px;
      font-family: inherit;
    }
    .entry-textarea::placeholder { color: var(--text-tertiary); }
    .entry-textarea:disabled {
      color: var(--text-primary); cursor: default; opacity: 1;
    }

    /* ─── Submit Button ─── */
    .submit-btn {
      width: 100%; padding: 15px;
      background: var(--text-primary); color: #fafaf9;
      border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
      cursor: pointer; transition: all 0.18s ease;
    }
    .submit-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .submit-btn:active:not(:disabled) { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ─── Empty / Completed state ─── */
    .completed-state {
      text-align: center; padding: 48px 24px;
      display: none;
    }
    .completed-icon {
      width: 64px; height: 64px; margin: 0 auto 16px;
      background: #f0fdf4; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .completed-icon svg { color: var(--success); }
    .completed-state h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 8px; }
    .completed-state p { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
    .edit-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 24px;
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.18s ease; font-family: inherit;
    }
    .edit-btn:hover { background: var(--surface-hover); color: var(--text-primary); border-color: var(--text-tertiary); }

    /* ─── History View ─── */
    .history-header { margin-bottom: 24px; }
    .history-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .history-header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 20px; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--text-tertiary); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 11px 14px 11px 40px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 15px; background: var(--surface); color: var(--text-primary);
      outline: none; transition: border-color 0.18s, box-shadow 0.18s; font-family: inherit;
    }
    .search-input:focus { border-color: #a8a29e; box-shadow: var(--shadow-sm); }
    .search-input::placeholder { color: var(--text-tertiary); }

    /* History groups */
    .history-group { margin-bottom: 24px; }
    .history-group-date {
      font-size: 12px; font-weight: 600; letter-spacing: 0.3px;
      color: var(--text-tertiary); text-transform: uppercase;
      margin-bottom: 8px; padding: 0 2px;
    }
    .history-card {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius); padding: 14px 16px;
    }
    .history-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0;
    }
    .history-item:not(:last-child) { border-bottom: 1px solid var(--border-light); }
    .history-bullet {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-tertiary); margin-top: 7px; flex-shrink: 0;
    }
    .history-text { font-size: 15px; line-height: 1.6; flex: 1; }
    .highlight { background: #fef9c3; border-radius: 3px; padding: 0 2px; }

    .empty-history {
      text-align: center; padding: 60px 24px;
      color: var(--text-tertiary);
    }
    .empty-history svg { margin-bottom: 12px; opacity: 0.4; }
    .empty-history p { font-size: 15px; }

    /* ─── Toast Modal ─── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.2);
      backdrop-filter: blur(4px); z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--surface); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 32px 28px calc(32px + env(safe-area-inset-bottom));
      width: 100%; max-width: 560px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      text-align: center;
    }
    .overlay.show .modal { transform: translateY(0); }
    .modal-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .modal-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
    .modal-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 28px; }
    .modal-btn {
      width: 100%; padding: 15px;
      background: var(--text-primary); color: #fafaf9;
      border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity 0.18s; font-family: inherit;
    }
    .modal-btn:hover { opacity: 0.88; }

    /* ─── Notification Banner ─── */
    .notif-banner {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: var(--text-primary); color: #fafaf9;
      border-radius: 12px; padding: 12px 20px;
      font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow-lg); z-index: 200;
      opacity: 0; pointer-events: none;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      white-space: nowrap;
    }
    .notif-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── Login View ─── */
    .login-view {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 40px 24px; text-align: center;
    }
    .login-logo {
      width: 72px; height: 72px; margin-bottom: 24px;
      background: #f0fdf4; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .login-title { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; margin-bottom: 8px; }
    .login-subtitle { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 36px; }
    .login-form { width: 100%; max-width: 360px; }
    .login-input {
      width: 100%; padding: 14px 16px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 15px; background: var(--surface); color: var(--text-primary);
      outline: none; transition: border-color 0.18s, box-shadow 0.18s; font-family: inherit;
      text-align: center; margin-bottom: 12px;
    }
    .login-input:focus { border-color: #a8a29e; box-shadow: var(--shadow-sm); }
    .login-input::placeholder { color: var(--text-tertiary); }
    .login-btn {
      width: 100%; padding: 15px;
      background: var(--text-primary); color: #fafaf9;
      border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.18s ease; font-family: inherit;
    }
    .login-btn:hover { opacity: 0.88; }
    .login-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .login-hint {
      font-size: 13px; color: var(--text-tertiary); margin-top: 16px; line-height: 1.6;
    }
    .login-sent {
      display: none;
      padding: 20px;
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: var(--radius);
      margin-top: 16px; text-align: left;
    }
    .login-sent h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--success); }
    .login-sent p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

    /* ─── User Menu ─── */
    .user-menu {
      position: absolute; top: 60px; right: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px;
      box-shadow: var(--shadow-lg); z-index: 60;
      min-width: 180px; display: none;
    }
    .user-menu.show { display: block; }
    .user-menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 14px; color: var(--text-primary);
      cursor: pointer; transition: background 0.15s;
      border: none; background: transparent; width: 100%; text-align: left; font-family: inherit;
    }
    .user-menu-item:hover { background: var(--surface-hover); }
    .user-menu-item.danger { color: #dc2626; }
    .user-menu-divider { height: 1px; background: var(--border-light); margin: 4px 0; }
    .user-menu-email {
      padding: 8px 12px 4px; font-size: 12px; color: var(--text-tertiary);
      border-bottom: 1px solid var(--border-light); margin-bottom: 4px;
      word-break: break-all;
    }

    /* ─── Sync Indicator ─── */
    .sync-badge {
      font-size: 11px; color: var(--text-tertiary);
      display: flex; align-items: center; gap: 4px;
    }
    .sync-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success);
    }
    .sync-dot.syncing { background: #eab308; animation: pulse 1s infinite; }
    .sync-dot.offline { background: var(--text-tertiary); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ─── Animations ─── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.1s; }
    .delay-3 { animation-delay: 0.15s; }

    [data-view] { display: none; }
    [data-view].active { display: block; }

    @media (max-width: 480px) {
      main { padding: 20px 16px 100px; }
      .nav { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- ═══ Login View ═══ -->
<div id="loginView" class="login-view" style="display:none;">
  <div class="login-logo">🌿</div>
  <div class="login-title">感恩日记</div>
  <div class="login-subtitle">每天记录三件感恩的事<br>跨设备同步，随时随地回顾</div>
  <div class="login-form">
    <input type="email" class="login-input" id="loginEmail" placeholder="输入你的邮箱" autocomplete="email" />
    <button class="login-btn" id="loginBtn">发送登录链接</button>
    <div class="login-hint">无需密码，点击邮件中的链接即可登录</div>
    <div class="login-sent" id="loginSent">
      <h3>✉️ 邮件已发送</h3>
      <p>请检查你的邮箱，点击邮件中的链接完成登录。</p>
    </div>
  </div>
</div>

<!-- ═══ App Shell ═══ -->
<div id="appShell" style="display:none;">

<!-- Navigation -->
<nav class="nav">
  <div class="nav-left">
    <div>
      <div class="nav-title">感恩日记</div>
      <div class="nav-date" id="navDate"></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="sync-badge" id="syncBadge">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">已同步</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="today">今天</button>
      <button class="nav-tab" data-tab="history">历史</button>
    </div>
    <div class="user-avatar" id="userAvatar" title="账户"></div>
  </div>
  <!-- User Menu -->
  <div class="user-menu" id="userMenu">
    <div class="user-menu-email" id="userMenuEmail"></div>
    <button class="user-menu-item danger" id="logoutBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      退出登录
    </button>
  </div>
</nav>

<main>

  <!-- ═══ Today View ═══ -->
  <div data-view="today" class="active">

    <div class="today-header fade-in-up">
      <h1 id="greetingTitle">今天，<br>你感恩什么？</h1>
      <p id="greetingSubtitle">写下今天让你心怀感激的三件事</p>
    </div>

    <div class="progress-row fade-in-up delay-1">
      <div class="progress-dots">
        <div class="dot" id="dot0"></div>
        <div class="dot" id="dot1"></div>
        <div class="dot" id="dot2"></div>
      </div>
      <span class="progress-label" id="progressLabel">0 / 3</span>
    </div>

    <!-- Entry forms -->
    <div class="entries-list fade-in-up delay-2" id="entriesContainer">
      <!-- Generated by JS -->
    </div>

    <button class="submit-btn fade-in-up delay-3" id="submitBtn" disabled>记录今天的感恩</button>

    <!-- Completed state -->
    <div class="completed-state" id="completedState">
      <div class="completed-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h2>今天的感恩已完成</h2>
      <p>你已记录了今天的三件感恩之事。<br>明天见 🌱</p>
      <button class="edit-btn" id="editBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        修改今天的记录
      </button>
    </div>

  </div>

  <!-- ═══ History View ═══ -->
  <div data-view="history">

    <div class="history-header">
      <h1>回顾感恩</h1>
      <p id="historyStats">共记录 0 天</p>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="search" class="search-input" id="searchInput" placeholder="搜索感恩内容…" />
    </div>

    <div id="historyList">
      <div class="empty-history">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
        </svg>
        <p>还没有记录，从今天开始吧</p>
      </div>
    </div>

  </div>

</main>

</div><!-- end appShell -->

<!-- Thank You Modal -->
<div class="overlay" id="thanksOverlay">
  <div class="modal">
    <span class="modal-icon">🌿</span>
    <div class="modal-title">谢谢你今天的感恩</div>
    <div class="modal-desc">每一次感恩都在悄悄改变你<br>看待世界的方式。明天继续加油。</div>
    <button class="modal-btn" id="modalCloseBtn">好，我知道了</button>
  </div>
</div>

<!-- Notification Banner -->
<div class="notif-banner" id="notifBanner"></div>

<script>

// ─── Storage ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'gratitude_entries_v1';

function loadLocal() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveLocal(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ─── Cloud Data ────────────────────────────────────────────────────────────
let allEntries = {};  // merged: local + cloud

async function loadCloud() {
  const user = supabase.auth.getUser ? (await supabase.auth.getUser()).data.user : null;
  if (!user) return {};
  try {
    setSyncStatus('syncing');
    const { data, error } = await supabase
      .from('entries')
      .select('*')
      .eq('user_id', user.id)
      .order('date', { ascending: false });
    if (error) { console.error('Load cloud error:', error); return {}; }
    const map = {};
    (data || []).forEach(row => {
      map[row.date] = [row.content1, row.content2, row.content3];
    });
    setSyncStatus('online');
    return map;
  } catch (e) {
    console.error('Cloud error:', e);
    setSyncStatus('offline');
    return {};
  }
}

async function saveCloud(dateKey, contents) {
  const user = (await supabase.auth.getUser()).data.user;
  if (!user) return;
  try {
    setSyncStatus('syncing');
    // Upsert: insert or update
    const { error } = await supabase
      .from('entries')
      .upsert({
        user_id: user.id,
        date: dateKey,
        content1: contents[0] || '',
        content2: contents[1] || '',
        content3: contents[2] || '',
      }, { onConflict: 'user_id,date' });
    if (error) console.error('Save cloud error:', error);
    setSyncStatus('online');
  } catch (e) {
    console.error('Cloud save error:', e);
    setSyncStatus('offline');
  }
}

async function migrateLocalToCloud() {
  const localData = loadLocal();
  const keys = Object.keys(localData);
  if (!keys.length) return;
  const user = (await supabase.auth.getUser()).data.user;
  if (!user) return;

  // Load existing cloud data to avoid overwriting
  const cloudData = await loadCloud();
  let migrated = 0;
  for (const key of keys) {
    if (cloudData[key]) continue; // cloud already has this date
    const contents = localData[key];
    if (contents && contents.length === 3 && contents.some(c => c.trim())) {
      await saveCloud(key, contents);
      migrated++;
    }
  }
  if (migrated > 0) {
    showBanner(`✅ 已将 ${migrated} 天的本地记录同步到云端`);
  }
  // Merge after migration
  allEntries = { ...localData, ...cloudData };
}

// ─── Merge local + cloud ──────────────────────────────────────────────────
function mergeData(localData, cloudData) {
  const merged = { ...localData };
  for (const key of Object.keys(cloudData)) {
    // Cloud data takes precedence if both exist
    merged[key] = cloudData[key];
  }
  return merged;
}

// ─── Sync Status ──────────────────────────────────────────────────────────
function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if (!dot || !text) return;
  dot.className = 'sync-dot';
  if (status === 'syncing') { dot.classList.add('syncing'); text.textContent = '同步中'; }
  else if (status === 'online') { text.textContent = '已同步'; }
  else if (status === 'offline') { dot.classList.add('offline'); text.textContent = '离线'; }
}

// ─── State ─────────────────────────────────────────────────────────────────
let entries = ['', '', ''];
let todayDone = false;
let currentUser = null;

// ─── Auth ──────────────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('loginView').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
}

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
}

async function initAuth() {
  // Check for magic link callback
  const { data, error } = await supabase.auth.getSession();
  if (data.session) {
    currentUser = data.session.user;
    showApp();
    await startApp();
    return;
  }
  showLogin();
}

// Listen for auth changes (magic link callback)
supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    currentUser = session.user;
    showApp();
    await startApp();
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    showLogin();
  }
});

// Login

  if (!email) { showBanner('请输入邮箱地址'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '发送中…';
  try {
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + window.location.pathname }
    });
    if (error) { showBanner('发送失败：' + error.message); btn.disabled = false; btn.textContent = '发送登录链接'; return; }
    document.getElementById('loginSent').style.display = 'block';
    btn.textContent = '重新发送';
    btn.disabled = false;
  } catch (e) {
    showBanner('发送失败，请重试');
    btn.disabled = false;
    btn.textContent = '发送登录链接';
  }
});

function updateUserUI() {
  if (!currentUser) return;
  const email = currentUser.email || '';
  document.getElementById('userMenuEmail').textContent = email;
  const avatar = document.getElementById('userAvatar');
  avatar.textContent = email.charAt(0).toUpperCase();

// ─── Start App (after login) ──────────────────────────────────────────────
async function startApp() {
  updateUserUI();

  // Load from cloud
  const cloudData = await loadCloud();

  // Merge with local
  const localData = loadLocal();
  allEntries = mergeData(localData, cloudData);

  // Migrate local data to cloud (one-time)
  await migrateLocalToCloud();

  // Re-merge after migration
  const updatedCloud = await loadCloud();
  allEntries = mergeData(localData, updatedCloud);

  // Save merged data locally as cache
  saveLocal(allEntries);

  // Init UI
  const key = todayKey();
  if (allEntries[key] && allEntries[key].length === 3) {
    entries = allEntries[key];
    todayDone = true;
  }
  setNavDate();
  setGreeting();
  renderToday();
  renderHistory();
  scheduleReminder();
}

  else if (h < 11)  { title = '早安，\n今天感恩什么？'; sub  = '清晨，是开始感恩练习的好时机'; }
  else if (h < 14)  { title = '午后，\n来记录今天的美好'; sub  = '写下今天让你心怀感激的三件事'; }
  else if (h < 18)  { title = '下午好，\n今天感谢谁了吗？'; sub  = '在一天结束前，记录三件感恩的事'; }
  else              { title = '今天，\n你感恩什么？'; sub  = '每天三件，点滴积累成改变'; }

  document.getElementById('greetingSubtitle').textContent = sub;

// ─── Today Render ──────────────────────────────────────────────────────────
function renderToday() {
  const container = document.getElementById('entriesContainer');
  const submitBtn = document.getElementById('submitBtn');
  const completedState = document.getElementById('completedState');

  if (todayDone) {
    container.style.display = 'flex';
    container.style.flexDirection = 'column';
    submitBtn.style.display = 'none';
    completedState.style.display = 'block';
    container.innerHTML = '';
    entries.forEach((text, i) => {
      container.appendChild(makeEntryCard(i, text, true));
    });
    updateProgress();
    return;
  }

  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  completedState.style.display = 'none';
  submitBtn.style.display = 'block';

  container.innerHTML = '';
  entries.forEach((text, i) => {
    container.appendChild(makeEntryCard(i, text, false));
  });
  updateProgress();
  updateSubmitBtn();
}

const PROMPTS = [
  '今天有哪个人让你感激？',
  '今天有哪件小事让你微笑？',
  '今天有什么是你习以为常但值得珍惜的？'
];

function makeEntryCard(index, value, disabled) {
  const card = document.createElement('div');
  card.className = 'entry-card';
  card.innerHTML = `
    <div class="entry-card-header">
      <span class="entry-number">感恩 ${index+1}</span>
      <span class="entry-tag ${value.trim() ? 'done' : ''}" id="tag-${index}">
        ${value.trim() ? '已填写' : '待填写'}
      </span>
    </div>
    <textarea
      class="entry-textarea"
      id="entry-${index}"
      placeholder="${PROMPTS[index]}"
      rows="2"
      maxlength="200"
      ${disabled ? 'disabled' : ''}
    >${value}</textarea>
  `;
  if (!disabled) {
    const ta = card.querySelector(`#entry-${index}`);
    ta.addEventListener('input', () => onEntryInput(index, ta.value));
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && index < 2) {
        e.preventDefault();
        const next = document.getElementById(`entry-${index+1}`);
        if (next) next.focus();
      }
    });
  }
  return card;
}

function onEntryInput(index, value) {
  entries[index] = value;
  const tag = document.getElementById(`tag-${index}`);
  if (tag) {
    tag.textContent = value.trim() ? '已填写' : '待填写';
    tag.className   = 'entry-tag ' + (value.trim() ? 'done' : '');
  }
  updateProgress();
  updateSubmitBtn();
  const ta = document.getElementById(`entry-${index}`);
  if (ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
}

function updateProgress() {
  const filled = entries.filter(e => e.trim()).length;
  for (let i = 0; i < 3; i++) {
    document.getElementById(`dot${i}`).classList.toggle('filled', i < filled || todayDone);
  }
  document.getElementById('progressLabel').textContent =
    todayDone ? '3 / 3 ✓' : `${filled} / 3`;
}

function updateSubmitBtn() {
  const allFilled = entries.every(e => e.trim().length > 0);
  document.getElementById('submitBtn').disabled = !allFilled;
}

// ─── Submit ────────────────────────────────────────────────────────────────
document.getElementById('submitBtn').addEventListener('click', async () => {
  if (!entries.every(e => e.trim())) return;
  const key = todayKey();
  const trimmed = entries.map(e => e.trim());

  // Save locally
  allEntries[key] = trimmed;
  saveLocal(allEntries);

  // Save to cloud
  if (currentUser) {
    await saveCloud(key, trimmed);
  }

  todayDone = true;
  renderToday();
  renderHistory();
  showThanksModal();
});

// ─── History Render ────────────────────────────────────────────────────────
function renderHistory(query = '') {
  const keys = Object.keys(allEntries).sort((a, b) => b.localeCompare(a));

  const statsEl = document.getElementById('historyStats');
  statsEl.textContent = keys.length ? `共记录 ${keys.length} 天` : '还没有记录';

  const listEl = document.getElementById('historyList');
  listEl.innerHTML = '';

  if (!keys.length) {
    listEl.innerHTML = `<div class="empty-history">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/>
      </svg>
      <p>还没有记录，从今天开始吧</p>
    </div>`;
    return;
  }

  let anyMatch = false;
  keys.forEach(key => {
    const dayEntries = allEntries[key];
    const filtered = query
      ? dayEntries.filter(e => e.toLowerCase().includes(query.toLowerCase()))
      : dayEntries;
    if (!filtered.length) return;
    anyMatch = true;

    const d = new Date(key + 'T00:00:00');
    const label = d.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

    const group = document.createElement('div');
    group.className = 'history-group';
    group.innerHTML = `<div class="history-group-date">${label}</div>`;

    const card = document.createElement('div');
    card.className = 'history-card';

    dayEntries.forEach(text => {
      const visible = !query || text.toLowerCase().includes(query.toLowerCase());
      const item = document.createElement('div');
      item.className = 'history-item';
      item.style.opacity = visible ? '1' : '0.3';
      item.innerHTML = `
        <div class="history-bullet"></div>
        <div class="history-text">${query ? highlight(text, query) : escapeHtml(text)}</div>
      `;
      card.appendChild(item);
    });

    group.appendChild(card);
    listEl.appendChild(group);
  });

  if (!anyMatch && query) {
    listEl.innerHTML = `<div class="empty-history">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <p>没有找到"${escapeHtml(query)}"相关记录</p>
    </div>`;
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, query) {
  const escaped = escapeHtml(text);
  const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(`(${q})`, 'gi'), '<mark class="highlight">$1</mark>');
}

// ─── Reminder (1 hour before midnight, local timezone) ─────────────────────
function scheduleReminder() {
  let lastBannerMinute = -1; // prevent repeated banners within same minute

  function checkAndNotify() {
    const key = todayKey();
    if (allEntries[key] && allEntries[key].length === 3 && allEntries[key].some(e => e.trim())) return; // already done

    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    const currentMinute = h * 60 + m;

    // 23:00 ~ 23:59 = 1 hour before midnight in user's local timezone
    if (h === 23 && currentMinute !== lastBannerMinute) {
      lastBannerMinute = currentMinute;
      const remaining = 60 - m;
      showBanner(`🌙 距午夜还有 ${remaining} 分钟，今天还没有写感恩日记`);
    }
  }

  // Check immediately, then every 60 seconds for more precise reminder
  checkAndNotify();
  setInterval(checkAndNotify, 60 * 1000);

  // Also use Notification API for system-level push
  if ('Notification' in window) {
    const scheduleWebNotif = () => {
      const now = new Date();
      const target = new Date();
      target.setHours(23, 0, 0, 0); // 11:00 PM local timezone
      if (now >= target) target.setDate(target.getDate() + 1);
      const msUntil = target - now;
      setTimeout(async () => {
        // Re-check if today's entry is still empty
        const key = todayKey();
        if (!allEntries[key] || !allEntries[key].some(e => e.trim())) {
          if (Notification.permission === 'granted') {
            new Notification('感恩日记 🌿', {
              body: '午夜前一小时提醒：今天还没有记录感恩，写下三件事吧',
              icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="52" font-size="52">🌿</text></svg>',
              tag: 'gratitude-reminder'
            });
          }
        }
        scheduleWebNotif();
      }, msUntil);
    };

    // Request permission on first click
    document.addEventListener('click', function requestPerm() {
      if (Notification.permission === 'default') {
        Notification.requestPermission().then(() => scheduleWebNotif());
      } else if (Notification.permission === 'granted') {
        scheduleWebNotif();
      }
      document.removeEventListener('click', requestPerm);
    }, { once: false });
  }
}

// ─── Banner Notification ───────────────────────────────────────────────────
function showBanner(msg) {
  const el = document.getElementById('notifBanner');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}
