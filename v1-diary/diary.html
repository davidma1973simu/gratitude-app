<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#faf0e4">
  <title>光之日记 · Gratitude</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-title" content="光之日记">
  <!-- html2canvas for card export -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

    :root {
      --bg: #fefcf9;
      --surface: #ffffff;
      --surface-hover: #fdf6f0;
      --border: #f0d9d0;
      --border-light: #fceeed;
      --text-primary: #3d2b1f;
      --text-secondary: #7a5c4a;
      --text-tertiary: #b8967a;
      --accent: #d4a574;
      --accent-soft: #fdf2ec;
      --danger: #d46868;
      --radius: 16px;
      --radius-lg: 24px;
      --shadow-sm: 0 2px 8px rgba(180,120,80,0.07);
      --shadow-md: 0 8px 32px rgba(180,120,80,0.13);
      --shadow-lg: 0 12px 48px rgba(180,120,80,0.18);
      --emotion-warm: #e8a87c;
      --emotion-calm: #7fb3a8;
      --emotion-hopeful: #d4b87a;
      --emotion-gentle: #c99bb5;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, 'SF Pro Text', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body { display: flex; flex-direction: column; min-height: 100dvh; }

    /* ─── Nav ─── */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(254,252,249,0.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border-light);
      padding: 0 20px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; color: var(--text-secondary);
      cursor: pointer; background: none; border: none;
      padding: 6px 10px; border-radius: 10px;
      transition: background 0.15s ease; font-family: inherit;
    }
    .nav-back:hover { background: var(--accent-soft); }
    .nav-title { font-size: 15px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.5px; }
    .nav-right { width: 60px; display: flex; align-items: center; justify-content: flex-end; }
    .nav-settings {
      width: 32px; height: 32px; border-radius: 8px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); transition: all 0.15s ease;
    }
    .nav-settings:hover { background: var(--accent-soft); color: var(--accent); }

    /* ─── Main ─── */
    main { flex:1; padding: 24px 20px 120px; max-width: 600px; margin:0 auto; width:100%; }

    .page-header { margin-bottom: 22px; text-align: center; }
    .page-header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.4px; color: var(--text-primary); margin-bottom: 5px; }
    .page-header p { font-size: 13.5px; color: var(--text-tertiary); letter-spacing: 0.3px; }

    /* ─── Input Area ─── */
    .input-section {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }
    .input-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .input-label { font-size: 13px; color: var(--text-tertiary); font-weight: 500; letter-spacing: 0.3px; }
    .import-btn {
      font-size: 12px; color: var(--accent); background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 4px 10px; cursor: pointer;
      transition: all 0.15s ease; font-family: inherit;
    }
    .import-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
    .import-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-textarea {
      width:100%; border:none; outline:none; resize:none;
      font-size: 15.5px; line-height: 1.75; color: var(--text-primary);
      background: transparent; font-family: inherit; min-height: 100px; max-height: 300px; padding:0;
    }
    .input-textarea::placeholder { color: var(--text-tertiary); opacity: 0.6; }

    .input-divider { height: 1px; background: var(--border-light); margin: 14px 0; }

    .attachment-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .attach-btn {
      display: flex; align-items: center; gap: 5px; padding: 7px 12px;
      border-radius: 10px; border: 1px dashed var(--border); background: transparent;
      color: var(--text-tertiary); font-size: 12.5px; cursor: pointer;
      transition: all 0.15s ease; font-family: inherit;
    }
    .attach-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .attach-btn svg { flex-shrink: 0; }
    .attach-btn.recording {
      border-color: var(--danger); color: var(--danger);
      background: rgba(212,104,104,0.06);
      animation: recordPulse 1.2s ease-in-out infinite;
    }
    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,104,104,0.15); }
      50% { box-shadow: 0 0 0 6px rgba(212,104,104,0); }
    }

    .preview-area { display: none; margin-top: 14px; gap: 10px; flex-wrap: wrap; }
    .preview-area.has-content { display: flex; }
    .preview-item {
      position:relative; width:72px; height:72px; border-radius: 12px;
      overflow:hidden; border: 1px solid var(--border-light); flex-shrink: 0;
    }
    .preview-item img { width:100%; height:100%; object-fit: cover; }
    .preview-item.audio-preview {
      width:auto; padding:8px 14px; background: var(--accent-soft);
      display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary);
    }
    .preview-remove {
      position:absolute; top:3px; right:3px; width:20px; height:20px;
      border-radius:50%; background:rgba(61,43,31,0.65); color:white;
      border:none; cursor:pointer; font-size:11px; line-height:20px;
      text-align:center; display:flex; align-items:center; justify-content:center;
    }
    .preview-remove:hover { background: var(--danger); }

    /* ─── Generate Button ─── */
    .generate-btn {
      width:100%; padding:14px; border-radius: var(--radius); border:none;
      background: linear-gradient(135deg, #d4a574, #e8b88a); color:white;
      font-size:15px; font-weight:700; cursor:pointer; transition: all 0.22s ease;
      box-shadow: 0 3px 16px rgba(212,165,116,0.28); letter-spacing: 0.5px; margin-bottom: 20px;
    }
    .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(212,165,116,0.38); }
    .generate-btn:active { transform: translateY(0); }
    .generate-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    /* ─── Loading ─── */
    .loading { display:none; text-align:center; padding:48px 20px; color:var(--text-tertiary); font-size:14px; }
    .loading.active { display:block; }
    .loading-dots { display:inline-flex; gap:5px; margin-top:14px; }
    .loading-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation: loadinDot 1.2s ease-in-out infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loadinDot { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1.1)} }

    /* ══════════════════════════════════════
       OUTPUT SECTION — Compact Instagram Card
       ══════════════════════════════════════ */
    .output-section {
      display: none;
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(180,120,80,0.15);
      position: relative;
      margin-bottom: 24px;
    }
    .output-section.active { display: block; }

    .output-deco-circle {
      position: absolute; top: -60px; right: -50px;
      width: 180px; height: 180px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,165,116,0.05), transparent 65%);
      pointer-events: none; z-index: 0;
    }

    .output-inner {
      padding: 22px 20px 24px;
      position: relative; z-index: 1;
    }

    /* Date + Tag row */
    .output-header-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .output-date-block { flex-shrink: 0; }
    .output-date-big {
      font-size: 38px; font-weight: 800; line-height: 1;
      color: var(--text-primary); letter-spacing: -1.5px;
    }
    .output-date-sub {
      font-size: 12px; color: var(--text-tertiary);
      margin-top: 2px; letter-spacing: 0.3px;
    }
    .output-tag {
      display: inline-block; padding: 4px 12px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(232,168,124,0.12), rgba(212,184,138,0.09));
      color: var(--accent); font-size: 10.5px; font-weight: 700; letter-spacing: 0.5px;
    }

    /* ─── Body: text left, image right ─── */
    .output-body-layout {
      display: flex; gap: 14px;
      margin-bottom: 16px; align-items: flex-start;
    }
    .output-text-block { flex: 1; min-width: 0; }

    /* Image right block */
    .output-image-block {
      width: 38%; max-width: 200px; flex-shrink: 0; align-self: flex-start;
    }
    .output-image-wrap {
      border-radius: 16px; overflow: hidden;
      position: relative; aspect-ratio: 3/4;
      box-shadow: 0 3px 16px rgba(180,120,80,0.12);
    }
    .output-image {
      width: 100%; height: 100%; object-fit: cover;
    }
    /* Small screen: stack */
    @media (max-width: 440px) {
      .output-body-layout { flex-direction: column; }
      .output-image-block { width: 100%; max-width: none; aspect-ratio: 16/10; }
    }

    /* ─── User input: handwriting + large + bold ─── */
    .diary-user-input {
      font-size: 20px; line-height: 1.9;
      color: var(--text-primary);
      font-family: 'STKaiti', 'KaiTi', '楷体', serif;
      font-weight: 700;
      letter-spacing: 0.4px;
      margin-bottom: 12px;
      white-space: pre-wrap; word-break: break-word;
    }
    .diary-user-input[contenteditable="true"] {
      outline: none; border-radius: 8px;
      padding: 10px; margin: -10px -10px 2px;
      transition: background 0.15s;
    }
    .diary-user-input[contenteditable="true"]:focus { background: var(--accent-soft); }

    /* ─── AI wrapper text: system font, smaller ─── */
    .diary-ai-text {
      font-size: 13.5px; line-height: 1.75;
      color: var(--text-secondary);
      margin-bottom: 14px;
      white-space: pre-wrap; word-break: break-word;
      font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      opacity: 0.8;
    }

    .diary-edit-hint {
      display: inline-block; font-size: 10px; color: var(--text-tertiary);
      opacity: 0.35; margin-left: 5px;
    }

    /* User attachments row */
    .output-attachments {
      display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .output-attachment-img {
      width: 48px; height: 48px; border-radius: 10px;
      object-fit: cover; border: 1px solid var(--border-light);
    }
    .output-attachment-audio {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 11px; background: var(--accent-soft);
      border-radius: 8px; font-size: 11.5px; color: var(--text-secondary);
    }

    /* ─── Emotion Dot Grid ─── */
    .emotion-dots { margin-bottom: 16px; }
    .emotion-dots-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    .emotion-dots-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px;
    }
    .emotion-dots-name {
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary); min-width: 40px; flex-shrink: 0;
    }
    .emotion-dots-track { display: flex; gap: 4px; }
    .emotion-dot {
      width: 11px; height: 11px; border-radius: 50%;
      transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .emotion-dot.empty { background: var(--border-light); opacity: 0.25; transform: scale(0.8); }
    .emotion-dot.warm { background: var(--emotion-warm); }
    .emotion-dot.calm { background: var(--emotion-calm); }
    .emotion-dot.hopeful { background: var(--emotion-hopeful); }
    .emotion-dot.gentle { background: var(--emotion-gentle); }

    /* ─── Insight Block ─── */
    .output-insight {
      font-size: 13px; line-height: 1.75;
      color: var(--text-secondary);
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(232,168,124,0.05), rgba(201,155,181,0.04));
      border-radius: 12px;
      margin-bottom: 14px;
      position: relative;
    }
    .output-insight::before {
      content: ''; position: absolute;
      left: -1px; top: 50%; transform: translateY(-50%);
      width: 2.5px; height: 50%;
      border-radius: 2.5px;
      background: linear-gradient(to bottom, var(--emotion-warm), var(--emotion-gentle));
    }
    .output-insight-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
    }

    /* ─── Tome ─── */
    .output-tome {
      font-size: 13.5px; line-height: 1.65;
      color: var(--text-primary);
      padding: 10px 0 2px;
      margin-bottom: 14px;
      border-top: 1px solid var(--border-light);
      font-style: italic; opacity: 0.85;
    }
    .output-tome-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-tertiary);
      margin-bottom: 3px; font-style: normal;
    }

    /* ─── Actions ─── */
    .output-actions { display: flex; gap: 8px; padding-top: 2px; flex-wrap: wrap; }
    .output-action-btn {
      flex: 1; padding: 10px; border-radius: 11px;
      border: 1px solid var(--border-light); background: var(--surface);
      color: var(--text-secondary); font-size: 12.5px; cursor: pointer;
      transition: all 0.15s ease; font-family: inherit;
      text-align: center; display: flex; align-items: center; justify-content: center; gap: 3px;
      min-width: 0;
    }
    .output-action-btn:hover { background: var(--accent-soft); border-color: var(--border); }
    .output-action-btn.primary {
      background: linear-gradient(135deg, #d4a574, #e8b88a); color: white;
      border-color: transparent; font-weight: 600;
    }
    .output-action-btn.primary:hover { box-shadow: 0 3px 14px rgba(212,165,116,0.28); }

    /* ─── Animations ─── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }

    /* ══════════════════════════════════════
       HISTORY SECTION
       ══════════════════════════════════════ */
    .history-section { margin-top: 28px; }
    .history-header {
      font-size: 12px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--text-tertiary);
      margin-bottom: 12px; display: flex; align-items: center; gap: 5px;
    }
    .history-empty {
      text-align: center; padding: 36px 18px; color: var(--text-tertiary);
      font-size: 13px; line-height: 1.75;
    }
    .history-empty-icon { font-size: 24px; margin-bottom: 6px; opacity: 0.45; }
    .history-item {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 8px;
      cursor: pointer; transition: all 0.15s ease;
      box-shadow: 0 1px 6px rgba(180,120,80,0.05);
    }
    .history-item:hover { border-color: var(--border); box-shadow: 0 3px 14px rgba(180,120,80,0.1); }
    .history-item-date {
      font-size: 11.5px; color: var(--text-tertiary); margin-bottom: 5px;
      letter-spacing: 0.2px;
    }
    .history-item-preview {
      font-size: 13.5px; line-height: 1.65; color: var(--text-secondary);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .history-item-tag {
      display: inline-block; margin-top: 6px;
      font-size: 10px; letter-spacing: 0.4px;
      padding: 2px 7px; border-radius: 7px;
    }
    /* Share hint bar */
    .share-hint-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(62,43,31,0.92); color: #fefcf9;
      padding: 13px 20px; z-index: 150;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; font-size: 12.5px; line-height: 1.5;
      transform: translateY(100%); opacity: 0;
      transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .share-hint-bar.show { transform: translateY(0); opacity: 1; }
    .share-hint-text { flex: 1; opacity: 0.82; }
    .share-hint-btn {
      background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 14px; border-radius: 9px;
      font-size: 12px; cursor: pointer; white-space: nowrap;
      transition: all 0.15s ease; flex-shrink: 0;
    }
    .share-hint-btn:active { background: rgba(255,255,255,0.28); }
    .share-hint-dismiss {
      background: none; border: none; color: rgba(255,255,255,0.45);
      font-size: 15px; cursor: pointer; padding: 4px; flex-shrink: 0;
    }
      background: var(--accent-soft); color: var(--accent); font-weight: 600;
    }

    /* ─── Settings Panel ─── */
    .settings-panel {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      background: rgba(61,43,31,0.25);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .settings-panel.active { display: flex; align-items: center; justify-content: center; }
    .settings-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      width: 92%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      animation: fadeInUp 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .settings-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .settings-sub { font-size: 12.5px; color: var(--text-tertiary); margin-bottom: 18px; line-height: 1.6; }
    .settings-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.3px; }
    .settings-input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: 13.5px; font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text-primary); background: var(--bg);
      outline: none; transition: border-color 0.15s ease;
    }
    .settings-input:focus { border-color: var(--accent); }
    .settings-input::placeholder { color: var(--text-tertiary); opacity: 0.5; }
    .settings-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 8px; line-height: 1.6; }
    .settings-actions { display: flex; gap: 10px; margin-top: 20px; }
    .settings-btn {
      flex: 1; padding: 10px; border-radius: 10px;
      font-size: 13.5px; font-weight: 600; cursor: pointer;
      transition: all 0.15s ease; font-family: inherit;
      border: none;
    }
    .settings-btn.cancel { background: var(--accent-soft); color: var(--text-secondary); }
    .settings-btn.cancel:hover { background: var(--border-light); }
    .settings-btn.save { background: linear-gradient(135deg, #d4a574, #e8b88a); color: white; }
    .settings-btn.save:hover { box-shadow: 0 3px 14px rgba(212,165,116,0.3); }
    .settings-status { font-size: 12px; margin-top: 10px; display: none; }
    .settings-status.ok { color: #5a8a5a; display: block; }
    .settings-status.err { color: var(--danger); display: block; }

    @media (max-width: 480px) {
      main { padding: 14px 12px 90px; }
      .input-section { padding: 14px; }
      .output-inner { padding: 18px 14px 20px; }
      .output-date-big { font-size: 32px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <button class="nav-back" onclick="goBack()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
    返回
  </button>
  <div class="nav-title">光之日记</div>
  <div class="nav-right">
    <button class="nav-settings" id="settingsBtn" onclick="toggleSettings()" title="AI 设置">

<script>
// ══════════════════════════════════════
// Settings
// ══════════════════════════════════════
function toggleSettings(){
  var panel = document.getElementById('settingsPanel');
  if(panel.classList.contains('active')){
    panel.classList.remove('active');
  } else {
    var key = localStorage.getItem('diary_ai_key') || '';
    document.getElementById('apiKeyInput').value = key;
    panel.classList.add('active');
    setTimeout(function(){ document.getElementById('apiKeyInput').focus(); }, 100);
  }
}
function saveSettings(){
  var key = document.getElementById('apiKeyInput').value.trim();
  var status = document.getElementById('settingsStatus');
  if(!key){
    localStorage.removeItem('diary_ai_key');
    status.className = 'settings-status ok';
    status.textContent = '已清除 API Key，将使用模拟模式';
    setTimeout(function(){ toggleSettings(); }, 1200);
    return;
  }
  if(!key.startsWith('sk-')){
    status.className = 'settings-status err';
    status.textContent = 'Key 格式不正确，应以 sk- 开头';
    return;
  }
  localStorage.setItem('diary_ai_key', key);
  status.className = 'settings-status ok';
  status.textContent = '已保存 ✦';
  setTimeout(function(){ toggleSettings(); }, 1000);
}

// ══════════════════════════════════════
// State
// ══════════════════════════════════════
var attachedImages = [];
var attachedAudio = null;
var mediaRecorder = null;
var recordingStream = null;
var recordingTimer = null;
var recordingSeconds = 0;

var IMAGE_DB = {
  warm: ['images/warm/warm-01.jpg','images/warm/warm-02.jpg','images/warm/warm-03.jpg','images/warm/warm-04.jpg','images/warm/warm-05.jpg','images/warm/warm-06.jpg'],
  calm: ['images/calm/calm-01.jpg','images/calm/calm-02.jpg','images/calm/calm-03.jpg','images/calm/calm-04.jpg','images/calm/calm-05.jpg','images/calm/calm-06.jpg'],
  hopeful: ['images/hopeful/hopeful-01.jpg','images/hopeful/hopeful-02.jpg','images/hopeful/hopeful-03.jpg','images/hopeful/hopeful-04.jpg','images/hopeful/hopeful-05.jpg','images/hopeful/hopeful-06.jpg'],
  gentle: ['images/gentle/gentle-01.jpg','images/gentle/gentle-02.jpg','images/gentle/gentle-03.jpg','images/gentle/gentle-04.jpg','images/gentle/gentle-05.jpg','images/gentle/gentle-06.jpg']
};

var EMOTION_KEYWORDS = {
  warm: ['爱','温暖','家人','朋友','陪伴','拥抱','谢谢','感激','关心','照顾','在一起','想念','幸福','甜蜜','牵手','微笑','开心','快乐','喜欢','妈妈','爸爸'],
  calm: ['平静','安静','安宁','放松','呼吸','冥想','独处','散步','发呆','慢下来','宁静','舒适','悠闲'],
  hopeful: ['希望','期待','明天','未来','梦想','目标','进步','成长','新的','开始','机会','阳光','日出','花开'],
  gentle: ['温柔','细腻','柔软','花瓣','叶子','雨','风','天空','云','水','自然','美好','感动','眼泪','心疼','珍惜']
};

var currentEmotion = null;
var currentDiaryKey = null; // track which saved diary is showing

// ══════════════════════════════════════
// Init
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('outputSection').classList.remove('active');
  document.getElementById('loadingSection').classList.remove('active');
  restoreDraft();
  updateImportButton();
  renderHistory();
  setTimeout(function() {
    document.querySelectorAll('.delay-1,.delay-2').forEach(function(el,i){ el.style.animationDelay=(i*0.08)+'s'; });
  }, 50);
});

// ══════════════════════════════════════
// Import Today's Gratitude
// ══════════════════════════════════════
function updateImportButton() {
  var btn = document.getElementById('importBtn');
  var todayKey = getTodayKey();
  var entries = loadV1Entries();
  if (entries[todayKey] && entries[todayKey].some(function(e){ return e && e.trim(); })) {
    btn.disabled = false;
    btn.title = '导入今天的感恩记录';
  } else {
    btn.disabled = true;
    btn.title = '今天还没有感恩记录';
  }
}

function loadV1Entries() {
  try {
    return JSON.parse(localStorage.getItem('gratitude_entries_v1')) || {};
  } catch(e) { return {}; }
}

function getTodayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function importToday() {
  var entries = loadV1Entries();
  var key = getTodayKey();
  var todayEntries = entries[key];
  if (!todayEntries || !todayEntries.some(function(e){ return e && e.trim(); })) {
    showNotification('今天还没有感恩记录');
    return;
  }

  var text = document.getElementById('diaryInput').value.trim();
  var importText = todayEntries.filter(function(e){ return e && e.trim(); }).join('\n');
  
  if (text.length > 0) {
    text = text + '\n' + importText;
  } else {
    text = importText;
  }
  
  document.getElementById('diaryInput').value = text;
  saveDraft();
  showNotification('已导入今日的感恩 ✦');
  logEvent('diary_imported_today', { count: todayEntries.filter(function(e){return e&&e.trim()}).length });
}

// ══════════════════════════════════════
// Image Upload / Voice Recording / Preview / Draft
// ══════════════════════════════════════
function handleImages(event) {
  var files = event.target.files;
  if (!files || !files.length) return;
  for (var i=0;i<files.length;i++) (function(file){
    if(!file.type.startsWith('image/'))return;
    var r=new FileReader();r.onload=function(e){
      attachedImages.push({file:file,dataUrl:e.target.result});renderPreviews();saveDraft();
    };r.readAsDataURL(file);
  })(files[i]);
  event.target.value='';
}
function toggleRecording(){ if(mediaRecorder&&mediaRecorder.state==='recording')stopRecording(); else startRecording(); }
function startRecording(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){showNotification('你的浏览器不支持录音');return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    recordingStream=stream;var mt='audio/webm';if(!MediaRecorder.isTypeSupported(mt))mt='audio/mp4';
    mediaRecorder=mt?new MediaRecorder(stream,{mimeType:mt}):new MediaRecorder(stream);
    var chunks=[];mediaRecorder.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data);};
    mediaRecorder.onstop=function(){
      var b=new Blob(chunks,{type:(chunks[0]&&chunks[0].type)||'audio/webm'});
      if(attachedAudio&&attachedAudio.url)URL.revokeObjectURL(attachedAudio.url);
      attachedAudio={blob:b,url:URL.createObjectURL(b),duration:recordingSeconds};
      renderPreviews();saveDraft();
      if(recordingStream){recordingStream.getTracks().forEach(function(t){t.stop();});recordingStream=null;}
    };
    mediaRecorder.start();recordingSeconds=0;
    var btn=document.getElementById('voiceBtn');btn.classList.add('recording');
    document.getElementById('voiceBtnText').textContent='录音中 0:00';
    recordingTimer=setInterval(function(){recordingSeconds++;
      var m=Math.floor(recordingSeconds/60),s=recordingSeconds%60;
      document.getElementById('voiceBtnText').textContent='录音中 '+m+':'+String(s).padStart(2,'0');
    },1000);
  }).catch(function(){showNotification('需要麦克风权限才能录音');});
}
function stopRecording(){ if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();clearInterval(recordingTimer);document.getElementById('voiceBtn').classList.remove('recording');document.getElementById('voiceBtnText').textContent='语音'; }
function renderPreviews(){
  var a=document.getElementById('previewArea');
  if(!attachedImages.length&&!attachedAudio){a.classList.remove('has-content');a.innerHTML='';return;}
  a.classList.add('has-content');var h='';
  attachedImages.forEach(function(item,idx){h+='<div class="preview-item"><img src="'+item.dataUrl+'" alt=""><button class="preview-remove" onclick="removeImage('+idx+')">✕</button></div>';});
  if(attachedAudio){var dur=attachedAudio.duration||0;h+='<div class="preview-item audio-preview" style="position:relative;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg> '+Math.floor(dur/60)+':'+String(dur%60).padStart(2,'0')+'<button class="preview-remove" style="position:static;background:none;color:inherit;margin-left:4px;" onclick="removeAudio()">✕</button></div>';}
  a.innerHTML=h;
}
function removeImage(idx){attachedImages.splice(idx,1);renderPreviews();saveDraft();}
function removeAudio(){if(attachedAudio&&attachedAudio.url)URL.revokeObjectURL(attachedAudio.url);attachedAudio=null;renderPreviews();saveDraft();}
function saveDraft(){try{localStorage.setItem('diary_draft',JSON.stringify({text:document.getElementById('diaryInput').value,savedAt:new Date().toISOString()}));}catch(e){}}
function restoreDraft(){try{var d=JSON.parse(localStorage.getItem('diary_draft')||'null');if(d&&d.text)document.getElementById('diaryInput').value=d.text;}catch(e){}}
function clearDraft(){localStorage.removeItem('diary_draft');}

// ══════════════════════════════════════
// Core: Generate (AI or Mock)
// ══════════════════════════════════════
function generateDiary(){
  var inp=document.getElementById('diaryInput').value.trim();
  if(!inp&&!attachedImages.length&&!attachedAudio){showNotification('请先写下感恩片段，或添加照片/语音');return;}

  document.getElementById('loadingSection').classList.add('active');
  document.getElementById('outputSection').classList.remove('active');

  var apiKey=(localStorage.getItem('diary_ai_key')||'').trim();

  if(apiKey&&apiKey.startsWith('sk-')){
    callDeepSeek(inp,apiKey).then(function(ai){
      renderFromAI(inp,ai);
    }).catch(function(err){
      console.warn('AI调用失败，使用模拟数据:',err);
      generateMock(inp);
    });
  } else {
    generateMock(inp);
  }
}

// ══════════════════════════════════════
// DeepSeek API Call
// ══════════════════════════════════════
function callDeepSeek(inputText,apiKey){
  return new Promise(function(resolve,reject){
    var ac=new AbortController();
    var tid=setTimeout(function(){ac.abort();},19000);
    var sysTxt='你是一个温暖的感恩日记助手。用户会写下今天感恩的片段，请生成以下内容并以纯JSON格式返回（不要有任何JSON以外的文字，不要加```标记）：\n1. "wrapper": 一段温暖的引导文字（35-65字），放在用户原始输入下方，语气温柔，与用户输入的具体细节相关，不要重复用户原话，而是延伸出一种感受\n2. "emotions": 情绪评分对象，四个维度各0-100的整数：{"warm":80,"calm":60,"hopeful":40,"gentle":70}\n3. "insight": 情绪洞察（30-50字），从用户输入中提取具体的人/事/物名，编织成一句温暖的鼓励，不要模板化通用话\n4. "tome": 致此刻的你（12-22字），一句话，与用户输入内容相关，温暖有力量\n只返回JSON。';
    var usrTxt='用户写下：\n'+inputText+'\n\n请返回JSON：';
    fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:sysTxt},{role:'user',content:usrTxt}],temperature:0.82,max_tokens:600}),
      signal:ac.signal
    }).then(function(r){
      clearTimeout(tid);
      if(!r.ok){if(r.status===401)throw new Error('API_KEY_INVALID');throw new Error('API error '+r.status);}
      return r.json();
    }).then(function(data){
      clearTimeout(tid);
      var text=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
      text=text.trim().replace(/^```[a-z]*\s*/i,'').replace(/```\s*$/,'');
      resolve(JSON.parse(text.trim()));
    }).catch(function(e){clearTimeout(tid);reject(e);});
  });
}

// ══════════════════════════════════════
// Render from AI result
// ══════════════════════════════════════
function renderFromAI(inputText,ai){
  var wrapper=ai.wrapper||'';
  var emotions=ai.emotions||{};
  var insight=ai.insight||'';
  var tome=ai.tome||'';

  // Validate emotions
  var emotionKeys=['warm','calm','hopeful','gentle'];
  emotionKeys.forEach(function(k){if(typeof emotions[k]!=='number'||emotions[k]<0||emotions[k]>100)emotions[k]=50;});

  currentEmotion=getDominantEmotion(emotions);
  var imageUrl=pickImage(currentEmotion);

  var parts={userText:inputText,aiText:wrapper};

  renderOutput(parts,imageUrl,emotions,insight,tome);

  currentDiaryKey='diary_'+formatDate(new Date());
  document.getElementById('loadingSection').classList.remove('active');
  var os=document.getElementById('outputSection');os.classList.add('active');os.classList.add('fade-in-up');
  setTimeout(function(){os.scrollIntoView({behavior:'smooth',block:'start'});},100);

  var btn=document.getElementById('generateBtn');
  btn.innerHTML='✦ 再写一篇';
  btn.dataset.mode='reset';

  clearDraft();
  logEvent('diary_ai_generated',{emotion:currentEmotion,hasImages:attachedImages.length,hasAudio:!!attachedAudio});
}

// ══════════════════════════════════════
// Generate with Mock Data (fallback)
// ══════════════════════════════════════
function generateMock(inp){
  setTimeout(function(){
    var emotions=analyzeEmotions(inp);
    currentEmotion=getDominantEmotion(emotions);
    var diaryParts=genDiaryParts(inp,emotions);
    var imageUrl=pickImage(currentEmotion);
    var analysis=genInsight(inp,emotions);
    var tome=genTome(inp,emotions);

    renderOutput(diaryParts,imageUrl,emotions,analysis,tome);
    currentDiaryKey='diary_'+formatDate(new Date());

    document.getElementById('loadingSection').classList.remove('active');
    var os=document.getElementById('outputSection');os.classList.add('active');os.classList.add('fade-in-up');
    setTimeout(function(){os.scrollIntoView({behavior:'smooth',block:'start'});},100);

    var btn=document.getElementById('generateBtn');
    btn.innerHTML='✦ 再写一篇';
    btn.dataset.mode='reset';

    clearDraft();
    logEvent('diary_mock_generated',{emotion:currentEmotion,hasImages:attachedImages.length,hasAudio:!!attachedAudio});
  },1000+Math.random()*800);
}

// ══════════════════════════════════════
// Generate Button Handler (dynamic: generate / reset)
// ══════════════════════════════════════
function handleGenerateBtn(){
  var btn = document.getElementById('generateBtn');
  if(btn.dataset.mode === 'reset'){
    resetForNew();
  } else {
    generateDiary();
  }
}

// ══════════════════════════════════════
// Reset for New Diary
// ══════════════════════════════════════
function resetForNew(){
  // Clear input + attachments
  document.getElementById('diaryInput').value = '';
  attachedImages = [];
  if(attachedAudio&&attachedAudio.url)URL.revokeObjectURL(attachedAudio.url);
  attachedAudio = null;
  renderPreviews();
  clearDraft();
  
  // Hide output, show input
  document.getElementById('outputSection').classList.remove('active');
  document.getElementById('diaryInput').focus();
  
  // Scroll to top
  window.scrollTo({behavior:'smooth',top:0});
  logEvent('diary_new_started');

  // 重置提交按钮文字和行为
  var btn = document.getElementById('generateBtn');
  btn.innerHTML = '✦ 整理成日记';
  btn.dataset.mode = 'generate';
}

// ══════════════════════════════════════
// Emotion Analysis
// ══════════════════════════════════════
function analyzeEmotions(text){
  var lower=text.toLowerCase(),scores={};
  for(var emo in EMOTION_KEYWORDS){
    var kw=EMOTION_KEYWORDS[emo],hits=0;
    for(var i=0;i<kw.length;i++)if(lower.indexOf(kw[i].toLowerCase())!==-1)hits++;
    scores[emo]=Math.min(Math.round((15+Math.random()*15)+(hits*12)),95);
  }
  var total=scores.warm+scores.calm+scores.hopeful+scores.gentle;
  if(total>0){var s=Math.min(220/total,1.3);for(var e in scores)scores[e]=Math.min(Math.round(scores[e]*s),95);}
  return scores;
}
function getDominantEmotion(s){var best='warm',bs=0;for(var e in s){if(s[e]>bs){bs=s[e];best=e;}}return best;}

// ══════════════════════════════════════
// Diary Parts — split user input vs AI text
// ══════════════════════════════════════
function genDiaryParts(input,emotions){
  var lines=input.split('\n').filter(function(l){return l.trim().length>0;});
  var subjects = extractSubjects(input);

  // User input — keep raw, lightly formatted
  var userText = lines.map(function(l){
    return l.trim().replace(/^[\·\-\*\d\.\、\）\)\】\］]\s*/, '');
  }).join('\n');

  // AI opening — warm, varied
  var openers=['今天有一些温柔的时刻想要记下来。','想把今天的这些光收藏进文字里。','有些小事，但它们让今天变得不一样。','记录下来，怕以后忘了这种感觉。'];
  var opener=openers[Math.floor(Math.random()*openers.length)];

  // AI closer
  var closers=['原来幸福就藏在这些不起眼的瞬间里。','每一天都值得被这样认真地记住。','光一直都在，只是有时候我们忙着赶路没注意到。'];
  var closer=closers[Math.floor(Math.random()*closers.length)];

  // AI wrapper (goes below user input)
  var aiLines = [];
  aiLines.push(opener);
  if(attachedImages.length>0) aiLines.push('（附上了 '+attachedImages.length+' 张照片，想把这一刻的样子留下来）');
  if(attachedAudio) aiLines.push('（还录了一段声音，那个瞬间的声音也很重要）');
  aiLines.push(closer);

  return { userText: userText, aiText: aiLines.join('\n') };
}
function pickImage(emo){var p=IMAGE_DB[emo]||IMAGE_DB.warm;return p[Math.floor(Math.random()*p.length)];}
function regenerateImage(){if(!currentEmotion)return;var el=document.getElementById('outputImage');el.style.opacity='0.3';
  setTimeout(function(){el.src=pickImage(currentEmotion);el.onload=function(){el.style.opacity='1';};el.style.transition='opacity 0.4s ease';},200);
}

// ══════════════════════════════════════
// Insight — INPUT-AWARE
// ══════════════════════════════════════
function genInsight(input, emotions){
  var subjects = extractSubjects(input);
  var dominant = getDominantEmotion(emotions);
  var score = emotions[dominant];

  var templates = {
    warm_high: function(s) {
      if(s&&s.length>0) return '你在今天里捕捉到了关于「'+s[0]+'」的温暖。这些瞬间之所以珍贵，不是因为它有多宏大，而是因为你愿意停下来感受它。你的心是打开着的，而光总是会找到这样的缝隙照进来。';
      return '今天的文字里有温度。那些被你注意到的瞬间，其实都是生活在向你发出的信号——它一直在等你看见。';
    },
    calm_high: function(s) {
      if(s&&s.length>0) return '你提到了「'+s[0]+'」，这种安静的力量往往比喧嚣更有重量。你正在学会和自己相处，这比任何外在的成就都更难得。';
      return '今天的文字有一种安静的重量。平静不是没有波澜，而是允许一切发生之后，依然能稳稳地接住自己。';
    },
    hopeful_high: function(s) {
      if(s&&s.length>0) return '从「'+s[0]+'」里读出了光的形状。你不是在等未来变好，你是在用每一个微小的感知去建造那个更好的未来。';
      return '你能从日常里读出希望的味道。这不是天生的乐观，是你一次次选择看见光的练习结果。';
    },
    gentle_high: function(s) {
      if(s&&s.length>0) return '你对「'+s[0]+'」的感知这么细腻，说明你的心没有因为忙碌而变得粗糙。敏感不是弱点，它是你和世界之间最温柔的通道。';
      return '你的感知力很细腻。在这个匆忙的世界里，还能被小事打动的人，内心都藏着一片很干净的光。';
    },
    mixed_warm_calm: function(s) {
      return '温暖和平静同时出现在你的文字里。这说明你有能力向外连接，也有空间向内安顿——这是一种很好的平衡，也是一个人真正开始爱自己时的样子。';
    },
    mixed_hopeful_gentle: function(s) {
      return '希望和温柔并存。你既在向往远方，也在珍视手边的小事。这种状态很美，像一束光——既照亮前方，也温暖脚下。';
    },
    default: function(s) {
      if(s&&s.length>0) return '你写下的这些关于「'+s[0]+'」的文字，在未来某一天翻回来的时候，会是自己送给自己的礼物。每一次认真记录，都是在给未来的自己写信。';
      return '每一次记录都是一次自我对话。你愿意把注意力放在美好的事物上，这件事本身就很了不起。';
    }
  };

  var key = dominant+'_'+(score>=50?'high':'');
  if(templates[key]) return templates[key](subjects);
  var sorted=Object.keys(emotions).sort(function(a,b){return emotions[b]-emotions[a]});
  var mixKey='mixed_'+sorted[0]+'_'+sorted[1];
  if(templates[mixKey]) return templates[mixKey](subjects);
  return templates.default(subjects);
}

function extractSubjects(text) {
  var results=[];
  var patterns=[
    /和(.{1,6}?)通电话|跟(.{1,6}?)(聊天|说话|通话)/,
    /看到(.{1,8})|遇见(.{1,8})/,
    /(妈妈|爸爸|朋友|家人|孩子|伴侣|同事|老师|闺蜜)/,
    /(阳光|咖啡|音乐|书|花|猫|狗|海|山|天空|日落|日出|雨|雪)/,
    /坐在(.{1,6})|走在(.{1,6})/,
    /(工作|学习|运动|旅行|散步|做饭|喝茶)/
  ];
  for(var i=0;i<patterns.length;i++){
    var m=text.match(patterns[i]);if(m){for(var j=1;j<m.length;j++){if(m[j]&&results.indexOf(m[j])===-1)results.push(m[j]);}}}
  return results.slice(0,2);
}
function genTome(input,emotions){
  var subjects=extractSubjects(input);
  var pool=[];
  if(subjects.length>0){
    var s=subjects[0];
    pool.push('今天有「'+s+'」陪你，真好。','记住这个有「'+s+'」在的一天。','和「'+s+'」有关的这些时刻，值得被记住。');
  }
  pool.push('你今天选择记录而不是忽略，这就是一种力量。','允许自己被小事感动的人，活得最真实。','光不挑地方，它照进每一个愿意看见的心里。','今天你收集了一些光。它们不会消失。','好好生活，就是把这些碎片一天天捡起来。');
  return pool[Math.floor(Math.random()*pool.length)];
}

function renderOutput(parts, imageUrl, emotions, analysis, tome){
  var now=new Date();
  document.getElementById('outputDateNum').textContent=now.getDate();
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  document.getElementById('outputImage').src=imageUrl;

function renderOutputAttachments(){
  var c=document.getElementById('outputAttachments');

  var h='';
  attachedImages.forEach(function(item){h+='<img class="output-attachment-img" src="'+item.dataUrl+'" alt="">';});
  if(attachedAudio)h+='<div class="output-attachment-audio"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg> 语音</div>';
  c.innerHTML=h;
}

// ══════════════════════════════════════
// Emotion DOT GRID
// ══════════════════════════════════════
function renderEmotionDots(scores){
  var container=document.getElementById('emotionBars');
  var labels={warm:'温暖',calm:'平静',hopeful:'希望',gentle:'温柔'};
  var order=['warm','calm','hopeful','gentle'];
  var TOTAL_DOTS=7;
  var html='<div class="emotion-dots-label">情绪光谱</div>';
  for(var i=0;i<order.length;i++){
    var emo=order[i],pct=scores[emo],filled=Math.round(pct/100*TOTAL_DOTS);
    if(filled===0&&pct>5)filled=1;if(filled>TOTAL_DOTS)filled=TOTAL_DOTS;
    html+='<div class="emotion-dots-row"><span class="emotion-dots-name">'+labels[emo]+'</span><div class="emotion-dots-track">';
    for(var d=0;d<TOTAL_DOTS;d++){
      html+='<span class="emotion-dot '+(d<filled?emo:'empty')+'" data-delay="'+(d*60)+'"></span>';
    }
    html+='</div></div>';
  }
  container.innerHTML=html;
  setTimeout(function(){
    var dots=container.querySelectorAll('.emotion-dot:not(.empty)');
    dots.forEach(function(dot){var delay=parseInt(dot.getAttribute('data-delay'))||0;
      dot.style.transform='scale(0)';dot.style.opacity='0';
      setTimeout(function(){dot.style.transition='all 0.35s cubic-bezier(0.34,1.56,0.64,1)';dot.style.transform='scale(1)';dot.style.opacity='1';},delay);
    });
  },150);
}

// ══════════════════════════════════════
// Save / Share
// ══════════════════════════════════════
function saveDiary(){
  var btn = document.querySelector('.output-action-btn[onclick="saveDiary()"]');
  if(btn){ btn.disabled = true; btn.innerHTML = '⏳ 生成中'; }

  // Clone card content, strip UI elements that shouldn't appear in image
  var cardEl = document.getElementById('outputSection');
  var clone = cardEl.cloneNode(true);
  clone.style.position = 'absolute';
  clone.style.left = '-9999px';
  clone.style.top = '0';
  clone.style.width = cardEl.offsetWidth + 'px';
  document.body.appendChild(clone);

  // Remove unwanted elements from clone
  var removeSelectors = ['.output-actions', '.diary-edit-hint'];
  removeSelectors.forEach(function(sel){
    clone.querySelectorAll(sel).forEach(function(el){ el.remove(); });
  });

  // Remove contenteditable from user input in clone (fixes cursor rendering)
  var userInput = clone.querySelector('.diary-user-input');
  if(userInput) userInput.removeAttribute('contenteditable');

  html2canvas(clone, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#ffffff',
    logging: false,
    allowTaint: false
  }).then(function(canvas){
    // Download as PNG
    var link = document.createElement('a');
    var dateStr = formatDate(new Date());
    link.download = '光之日记_' + dateStr + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

    // Cleanup
    document.body.removeChild(clone);
    if(btn){ btn.disabled = false; btn.innerHTML = '💾 保存图片'; }
    showNotification('卡片已保存 ✦');
    showShareHint();

    // Also persist text data to localStorage (for history)
    persistDiaryData();
    logEvent('diary_card_saved',{emotion:currentEmotion});
  }).catch(function(err){
    console.warn('html2canvas error:', err);
    document.body.removeChild(clone);
    if(btn){ btn.disabled = false; btn.innerHTML = '💾 保存图片'; }
    // Fallback: just persist text data
    persistDiaryData();
    showNotification('图片生成失败，已保存文字');
    logEvent('diary_save_fallback');
  });
}

// Persist diary data to localStorage for history list
function persistDiaryData(){
  var t=document.getElementById('outputUserInput').innerText+'\n'+document.getElementById('outputAiText').innerText;
  var k='diary_'+formatDate(new Date());
  try{
    var saved=JSON.parse(localStorage.getItem('saved_diaries')||'{}');
    saved[k]={text:t,image:document.getElementById('outputImage').src,emotion:currentEmotion,savedAt:new Date().toISOString()};
    localStorage.setItem('saved_diaries',JSON.stringify(saved));
    renderHistory();
  }catch(e){}
}
function shareDiary(){
  var t=document.getElementById('outputUserInput').innerText+'\n'+document.getElementById('outputAiText').innerText;
  var d={title:'光之日记 · '+formatDate(new Date()),text:t+'\n\n— 来自光之日记 Gratitude'};
  if(navigator.share)navigator.share(d).catch(function(){});else if(navigator.clipboard)navigator.clipboard.writeText(d.text).then(function(){showNotification('已复制 📋');});
  logEvent('diary_share_attempted');
}
function goBack(){
  if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
  var basePath = window.location.pathname.replace(/[^/]*$/, '');
  location.href = basePath + 'index.html';
}

function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ══════════════════════════════════════
// History Rendering
// ══════════════════════════════════════
function renderHistory(){
  var container = document.getElementById('historyList');
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem('saved_diaries')||'{}'); } catch(e){}
  
  var keys = Object.keys(saved).sort().reverse();
  
  if(keys.length===0){
    container.innerHTML = '<div class="history-empty"><div class="history-empty-icon">📝</div>保存的日记会在这里出现<br>写下第一篇吧</div>';
    return;
  }
  
  var html = '';
  var emotionLabels = { warm:'温暖', calm:'平静', hopeful:'希望', gentle:'温柔' };
  keys.forEach(function(key){
    var entry = saved[key];
    if(!entry) return;
    var preview = (entry.text||'').replace(/\n/g,' ').substring(0,80);
    var dateStr = key.replace('diary_','');
    var parts = dateStr.split('-');
    var formatted = parts[0]+'年'+parseInt(parts[1])+'月'+parseInt(parts[2])+'日';
    html += '<div class="history-item" onclick="viewDiary(\''+key.replace(/'/g,'\\\'')+'\')">'
          + '<div class="history-item-date">📅 '+formatted+'</div>'
          + '<div class="history-item-preview">'+preview+'</div>'
          + (entry.emotion?'<span class="history-item-tag">'+emotionLabels[entry.emotion]+'</span>':'')
          + '</div>';
  });
  container.innerHTML = html;
}

function viewDiary(key){
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem('saved_diaries')||'{}'); } catch(e){ return; }
  var entry = saved[key];
  if(!entry) return;
  
  // Parse text back into parts (user text + AI text)
  var text = entry.text || '';
  var lines = text.split('\n');
  
  // Show output section
  document.getElementById('outputDateNum').textContent = key.replace('diary_','').split('-')[2] || '—';
  var dateParts = key.replace('diary_','').split('-');
  var months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('outputDateStr').textContent = (months[parseInt(dateParts[1])||''])+' · '+dateParts[0];
  
  if(entry.image) document.getElementById('outputImage').src = entry.image;
  
  // Split text: first non-empty lines = user input, rest = AI
  var nonEmpty = lines.filter(function(l){ return l.trim().length>0; });
  var userPart = nonEmpty.slice(0,3).join('\n');
  var aiPart = nonEmpty.slice(3).join('\n');
  
  document.getElementById('outputUserInput').textContent = userPart;
  document.getElementById('outputAiText').textContent = aiPart;
  
  // Hide emotion/insight/tome for saved diaries (or regenerate)
  document.getElementById('outputSection').classList.add('active');
  document.getElementById('outputSection').classList.add('fade-in-up');
  document.getElementById('outputSection').scrollIntoView({behavior:'smooth',block:'start'});
  
  currentDiaryKey = key;
  logEvent('diary_viewed',{key:key});
}

function showNotification(msg){
  var n=document.createElement('div');n.textContent=msg;
  n.style.cssText='position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-16px);background:#3d2b1f;color:#fff;padding:10px 22px;border-radius:12px;font-size:13.5px;z-index:200;opacity:0;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);box-shadow:0 4px 20px rgba(0,0,0,0.12);white-space:nowrap;';
  document.body.appendChild(n);
  requestAnimationFrame(function(){requestAnimationFrame(function(){n.style.opacity='1';n.style.transform='translateX(-50%) translateY(0)';});});
  setTimeout(function(){n.style.opacity='0';n.style.transform='translateX(-50%) translateY(-16px)';setTimeout(function(){n.remove();},300);},2200);
}
function logEvent(ev,props){try{var es=JSON.parse(localStorage.getItem('diary_events')||'[]');es.push({event:ev,properties:props||{},ts:new Date().toISOString()});if(es.length>200)es=es.slice(-200);localStorage.setItem('diary_events',JSON.stringify(es));}catch(e){}}


function showShareHint(){
  var bar = document.getElementById('shareHintBar');
  if(bar){ bar.classList.add('show'); setTimeout(function(){ bar.classList.remove('show'); }, 8000); }
}
function copyShareLink(){
  var link = '光之日记 — 用 AI 把感恩写成一封给自己的信
https://davidma1973simu.github.io/gratitude-app/v1-diary/';

    navigator.clipboard.writeText(link).then(function(){ showNotification('已复制链接 📋'); });

function dismissShareHint(){
